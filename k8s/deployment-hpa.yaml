# k8s/deployment-hpa.yaml

# ── LMS Service (identical to No-HPA) ────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lms-deployment
  labels:
    app: lms-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lms
  template:
    metadata:
      labels:
        app: lms
    spec:
      containers:
      - name: lms
        image: lms-service:v1
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
        env:
        - name: RECOMMENDER_URL
          value: 'http://recommender-service:8001'
---
apiVersion: v1
kind: Service
metadata:
  name: lms-service
spec:
  selector:
    app: lms
  type: LoadBalancer
  ports:
  - port: 8000
    targetPort: 8000
---

# ── Recommender Service (WITH resource limits — enables HPA) ─────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: recommender-deployment
  labels:
    app: recommender-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: recommender
  template:
    metadata:
      labels:
        app: recommender
    spec:
      containers:
      - name: recommender
        image: recommender-service:v1
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8001
        resources:
          requests:
            cpu: '100m'      # HPA uses this as the denominator for CPU%
            memory: '128Mi'
          limits:
            cpu: '500m'      # Cap at 0.5 CPU cores per pod
            memory: '256Mi'
---
apiVersion: v1
kind: Service
metadata:
  name: recommender-service
spec:
  selector:
    app: recommender
  type: ClusterIP
  ports:
  - port: 8001
    targetPort: 8001
